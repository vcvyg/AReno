name: Publish PyPI sdist

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish, for example v0.0.2"
        required: true
        type: string

jobs:
  publish:
    name: Build and publish areno source distribution
    runs-on: ubuntu-latest
    environment: build
    permissions:
      contents: read
    env:
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
      RELEASE_TAG: ${{ inputs.tag }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Checkout release tag from main
        run: |
          python - <<'PY'
          import os
          import re

          # Tags use a leading `v` (e.g. v0.0.2). The PEP 440 package version
          # written into pyproject.toml/sdist strips that prefix (-> 0.0.2),
          # so the git tag and the distribution version stay in lockstep.
          tag = os.environ["RELEASE_TAG"]
          if not re.fullmatch(r"v[0-9]+(?:\.[0-9]+)*(?:[a-zA-Z0-9_.!+-]*)?", tag):
              raise SystemExit(f"invalid release tag (expected leading 'v', e.g. v0.0.2): {tag!r}")
          PY
          if ! git fetch --force origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"; then
            echo "::error::tag ${RELEASE_TAG} does not exist on origin"
            exit 1
          fi
          tag_commit="$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")"
          if ! git merge-base --is-ancestor "${tag_commit}" origin/main; then
            echo "::error::tag ${RELEASE_TAG} is not reachable from origin/main"
            exit 1
          fi
          git checkout --detach "${tag_commit}"
          echo "RELEASE_VERSION=${RELEASE_TAG#v}" >> "${GITHUB_ENV}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build twine setuptools wheel

      - name: Validate package metadata
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          pyproject = Path("pyproject.toml")
          text = pyproject.read_text()
          if 'name = "areno"' not in text:
              raise SystemExit("pyproject.toml project name must be areno")
          version = os.environ["RELEASE_VERSION"]
          pyproject.write_text(re.sub(r'^version = ".*"$', f'version = "{version}"', text, count=1, flags=re.M))
          PY

      - name: Build source distribution only
        env:
          ARENO_BUILD_EXT: "0"
        run: |
          rm -rf dist build *.egg-info
          python -m build --sdist --no-isolation
          test -n "$(find dist -maxdepth 1 -name 'areno-*.tar.gz' -print -quit)"
          test -z "$(find dist -maxdepth 1 -name '*.whl' -print -quit)"

      - name: Check distribution
        run: python -m twine check dist/*.tar.gz

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ env.PYPI_TOKEN }}
        run: python -m twine upload --non-interactive dist/*.tar.gz
