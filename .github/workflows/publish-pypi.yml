name: Publish PyPI sdist

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Git branch, tag, or SHA to release"
        required: true
        default: "master"
        type: string
      version:
        description: "PyPI version to publish, for example 0.1.0"
        required: true
        type: string

jobs:
  publish:
    name: Build and publish areno source distribution
    runs-on: ubuntu-latest
    environment: build
    permissions:
      contents: read
    env:
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
      RELEASE_VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build twine setuptools wheel

      - name: Validate package metadata
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          pyproject = Path("pyproject.toml")
          text = pyproject.read_text()
          if 'name = "areno"' not in text:
              raise SystemExit("pyproject.toml project name must be areno")
          version = os.environ["RELEASE_VERSION"]
          if not re.fullmatch(r"[0-9]+(?:\.[0-9]+)*(?:[a-zA-Z0-9_.!+-]*)?", version):
              raise SystemExit(f"invalid release version: {version!r}")
          pyproject.write_text(re.sub(r'^version = ".*"$', f'version = "{version}"', text, count=1, flags=re.M))
          PY

      - name: Build source distribution only
        run: |
          rm -rf dist build *.egg-info
          python -m build --sdist --no-isolation
          test -n "$(find dist -maxdepth 1 -name 'areno-*.tar.gz' -print -quit)"
          test -z "$(find dist -maxdepth 1 -name '*.whl' -print -quit)"

      - name: Check distribution
        run: python -m twine check dist/*.tar.gz

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ env.PYPI_TOKEN }}
        run: python -m twine upload --non-interactive dist/*.tar.gz
