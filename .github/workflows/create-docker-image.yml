name: create docker image

permissions: write-all

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git branch, tag, or SHA to build"
        required: false
        default: "main"
      image_name:
        description: "GHCR image name"
        required: true
        default: "areno"
      tag:
        description: "Docker image tag"
        required: true
        default: "latest"
      dockerfile:
        description: "Dockerfile path"
        required: false
        default: "Dockerfile"
      context:
        description: "Docker build context"
        required: false
        default: "."

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set lowercase image owner
        run: echo "OWNER_LOWER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/${{ inputs.image_name }}:${{ inputs.tag }}
