name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unittest:
    name: unittest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ARENO_CHECK_TOKEN_IDS: "1"
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CPU test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade \
            pytest \
            psutil \
            numpy \
            pydantic \
            click \
            fastapi \
            openai \
            uvicorn \
            safetensors \
            transformers \
            huggingface-hub \
            datasets \
            tensorboard \
            tqdm
          python -m pip install --upgrade "torch>=2.6" --index-url https://download.pytorch.org/whl/cpu
          ARENO_BUILD_EXT=0 python -m pip install -e . --no-build-isolation --no-deps

      - name: Run unit tests
        run: python -m pytest tests/ -k cpu
